<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Hub - Modern Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background: #fcfdfe; color: #1e293b; font-size: 16px; }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; background: #f5f3ff; }
        .noti-dropdown { display: none; position: absolute; right: 0; top: 70px; width: 350px; z-index: 50; }
        .noti-dropdown.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        /* ป้องกันข้อความใน Badge ตัดบรรทัด */
        .status-badge { white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; min-width: 80px; }
    </style>
</head>
<body class="min-h-screen pb-16">

    <!-- Header & Brand -->
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                    <i class="fa-solid fa-book-open text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">LibraryHub</h1>
                    <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest">Management System</p>
                </div>
            </div>
            
            <div class="relative">
                <button onclick="toggleNoti()" class="relative p-3 text-slate-400 hover:text-indigo-600 transition-colors">
                    <i class="fa-solid fa-bell text-2xl"></i>
                    <span id="noti-dot" class="hidden absolute top-2.5 right-2.5 w-3 h-3 bg-rose-500 rounded-full border-2 border-white"></span>
                </button>
                <div id="noti-panel" class="noti-dropdown bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden">
                    <div class="px-6 py-4 bg-slate-50 border-b border-slate-100 text-xs font-bold uppercase text-slate-400 tracking-wider">แจ้งเตือนหนังสือค้างส่ง</div>
                    <div id="noti-content" class="max-h-80 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mt-10">
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm flex items-center gap-5">
                <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 text-xl"><i class="fa-solid fa-database"></i></div>
                <div><p class="text-xs font-bold text-slate-400 uppercase mb-1">ทั้งหมด</p><h2 id="stat-total" class="text-2xl font-black">0</h2></div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-emerald-50 shadow-sm flex items-center gap-5">
                <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500 text-xl"><i class="fa-solid fa-check"></i></div>
                <div><p class="text-xs font-bold text-emerald-500 uppercase mb-1">มีอยู่</p><h2 id="stat-available" class="text-2xl font-black text-emerald-600">0</h2></div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-orange-50 shadow-sm flex items-center gap-5">
                <div class="w-14 h-14 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-500 text-xl"><i class="fa-solid fa-clock"></i></div>
                <div><p class="text-xs font-bold text-orange-500 uppercase mb-1">ถูกยืม</p><h2 id="stat-borrowed" class="text-2xl font-black text-orange-600">0</h2></div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-rose-50 shadow-sm flex items-center gap-5">
                <div class="w-14 h-14 bg-rose-50 rounded-2xl flex items-center justify-center text-rose-500 text-xl"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <div><p class="text-xs font-bold text-rose-500 uppercase mb-1">หาย</p><h2 id="stat-lost" class="text-2xl font-black text-rose-600">0</h2></div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
            <div class="flex overflow-x-auto border-b border-slate-50 scrollbar-hide">
                <button onclick="switchTab('all')" id="tab-all" class="flex items-center gap-3 px-8 py-5 text-sm font-bold whitespace-nowrap tab-active transition-all">
                    <i class="fa-solid fa-layer-group text-base"></i> หนังสือทั้งหมด
                </button>
                <button onclick="switchTab('borrows')" id="tab-borrows" class="flex items-center gap-3 px-8 py-5 text-sm font-bold whitespace-nowrap text-slate-400 hover:text-indigo-600 transition-all">
                    <i class="fa-solid fa-arrow-right-arrow-left text-base"></i> รายการยืมคืน
                </button>
                <button onclick="switchTab('lost')" id="tab-lost" class="flex items-center gap-3 px-8 py-5 text-sm font-bold whitespace-nowrap text-slate-400 hover:text-indigo-600 transition-all">
                    <i class="fa-solid fa-circle-exclamation text-base"></i> แจ้งหาย/ชำรุด
                </button>
                <button onclick="switchTab('history')" id="tab-history" class="flex items-center gap-3 px-8 py-5 text-sm font-bold whitespace-nowrap text-slate-400 hover:text-indigo-600 transition-all">
                    <i class="fa-solid fa-clock-rotate-left text-base"></i> ประวัติการคืน
                </button>
            </div>

            <div class="p-8 flex flex-col md:flex-row justify-between items-center gap-6 bg-slate-50/30">
                <div class="relative w-full md:max-w-md">
                    <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                    <input type="text" id="searchInput" oninput="renderData()" placeholder="ค้นหาชื่อหนังสือ หรือ ID..." class="w-full pl-12 pr-6 py-4 bg-white border border-slate-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-100 outline-none transition-all">
                </div>
                <button onclick="openModal('add')" class="w-full md:w-auto bg-indigo-600 text-white px-10 py-4 rounded-2xl text-sm font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all">
                    <i class="fa-solid fa-plus mr-3"></i>เพิ่มหนังสือใหม่
                </button>
            </div>

            <div class="p-4 md:p-8 min-h-[500px]">
                <div id="view-container" class="overflow-x-auto"></div>
            </div>
        </div>
    </main>

    <!-- Unified Modal (Add/Edit) -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl">
            <h3 id="modal-title" class="text-xl font-bold mb-8 text-slate-800 flex items-center gap-3">
                <i class="fa-solid fa-pen-nib text-indigo-500"></i> บันทึกข้อมูล
            </h3>
            <div class="space-y-6">
                <input type="hidden" id="form-mode">
                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">รหัสหนังสือ (Book ID)</label>
                    <input type="text" id="f-id" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-base font-mono focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all">
                </div>
                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">ชื่อหนังสือ (Book Title)</label>
                    <input type="text" id="f-title" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-base focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all">
                </div>
                <div id="f-status-group">
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">สถานะ</label>
                    <select id="f-status" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-base outline-none cursor-pointer focus:ring-4 focus:ring-indigo-50 transition-all">
                        <option value="available">มีอยู่</option>
                        <option value="borrowed">ถูกยืม</option>
                        <option value="lost">หาย</option>
                    </select>
                </div>
                <div class="flex gap-4 mt-10">
                    <button onclick="closeModal()" class="flex-1 py-4 text-slate-400 font-bold text-sm hover:text-slate-600">ยกเลิก</button>
                    <button onclick="saveBook()" class="flex-[2] py-4 bg-indigo-600 text-white rounded-2xl font-bold text-sm shadow-xl shadow-indigo-100 hover:bg-indigo-700">ยืนยันบันทึกข้อมูล</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Borrow Modal -->
    <div id="modal-borrow" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl overflow-hidden relative">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-orange-50 text-orange-500 rounded-[1.5rem] flex items-center justify-center mx-auto mb-5 text-3xl">
                    <i class="fa-solid fa-handshake"></i>
                </div>
                <h3 class="font-bold text-xl text-slate-800">ยืนยันการยืมหนังสือ</h3>
                <p id="b-book-title" class="text-xs text-orange-500 font-bold uppercase mt-2 tracking-wide"></p>
            </div>

            <div class="bg-orange-50/50 rounded-2xl p-5 mb-6 border border-orange-100">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-orange-600 uppercase tracking-widest">ระยะเวลาการยืม</span>
                    <span class="text-sm font-black text-orange-700">7 วัน</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">กำหนดคืนวันที่</span>
                    <span id="b-return-date" class="text-sm font-black text-slate-700 underline decoration-orange-300 decoration-2"></span>
                </div>
            </div>

            <input type="hidden" id="b-id">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1 block">ชื่อผู้ยืม</label>
                    <input type="text" id="b-user" placeholder="ระบุชื่อ-นามสกุล" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-base outline-none focus:bg-white focus:ring-4 focus:ring-orange-50 transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1 block">เบอร์โทรติดต่อ</label>
                    <input type="tel" id="b-phone" placeholder="08x-xxx-xxxx" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-base outline-none focus:bg-white focus:ring-4 focus:ring-orange-50 transition-all">
                </div>
                
                <button onclick="confirmBorrow()" class="w-full py-5 bg-orange-500 text-white rounded-2xl font-bold text-sm shadow-xl shadow-orange-100 hover:bg-orange-600 active:scale-95 transition-all mt-4">
                    ยืนยันบันทึกรายการยืม
                </button>
                <button onclick="closeModal()" class="w-full text-xs text-slate-300 font-bold uppercase py-2 tracking-widest hover:text-slate-500 transition-colors">ย้อนกลับ</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, addDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse('{"apiKey":"AIzaSyDnawFy5prH0bPLNbJGH4uCB9Qnu2olNbo","authDomain":"museumapp-c49a8.firebaseapp.com","projectId":"museumapp-c49a8","storageBucket":"museumapp-c49a8.firebasestorage.app","messagingSenderId":"246960041791","appId":"1:246960041791:web:78911e60ff746a97ab6d8a"}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lib-v3-final';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let books = [];
        let history = [];
        let currentTab = 'all';

        signInAnonymously(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'books'), (snap) => {
                    books = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderData();
                    updateStats();
                });

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'history'), (snap) => {
                    history = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.at?.seconds || 0) - (a.at?.seconds || 0));
                    if(currentTab === 'history') renderData();
                });
            }
        });

        window.renderData = () => {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('view-container');
            
            let html = `<table class="w-full text-left border-separate border-spacing-y-2 table-auto">
                <thead><tr class="text-xs text-slate-400 font-bold uppercase tracking-widest">
                    <th class="px-6 py-4 w-20">ID</th>
                    <th class="px-6 py-4">รายการ</th>
                    <th class="px-6 py-4 w-24">สถานะ</th>
                    <th class="px-6 py-4 text-right w-40">ดำเนินการ</th>
                </tr></thead><tbody class="divide-y divide-slate-50">`;

            if (currentTab === 'all') {
                const filtered = books.filter(b => b.title?.toLowerCase().includes(search) || b.id.toLowerCase().includes(search));
                html += filtered.map(b => `
                    <tr class="bg-white hover:bg-slate-50 transition-all rounded-2xl group">
                        <td class="px-6 py-5 font-mono text-xs text-slate-400">#${b.id}</td>
                        <td class="px-6 py-5 font-bold text-slate-700 text-sm">${b.title}</td>
                        <td class="px-6 py-5">${getStatusBadge(b)}</td>
                        <td class="px-6 py-5 text-right flex justify-end items-center gap-2 opacity-80 group-hover:opacity-100">
                            ${b.status === 'available' ? `<button onclick="borrowPrompt('${b.id}')" class="px-5 py-2 bg-indigo-50 text-indigo-600 rounded-xl text-xs font-bold hover:bg-indigo-600 hover:text-white transition-all whitespace-nowrap">ยืม</button>` : ''}
                            <button onclick="openModal('edit', '${b.id}')" class="p-3 text-slate-300 hover:text-indigo-500 hover:bg-white rounded-xl"><i class="fa-solid fa-pen text-base"></i></button>
                            <button onclick="deleteBook('${b.id}')" class="p-3 text-slate-300 hover:text-rose-500 hover:bg-white rounded-xl"><i class="fa-solid fa-trash text-base"></i></button>
                        </td>
                    </tr>`).join('');
            } else if (currentTab === 'borrows') {
                const borrowed = books.filter(b => b.status === 'borrowed');
                html += borrowed.map(b => {
                    const dueDate = b.ts ? new Date(b.ts.seconds * 1000) : new Date();
                    dueDate.setDate(dueDate.getDate() + 7);
                    const isOverdue = new Date() > dueDate;

                    return `
                    <tr class="bg-white rounded-2xl">
                        <td class="px-6 py-6 font-mono text-xs text-slate-400">#${b.id}</td>
                        <td class="px-6 py-6">
                            <div class="text-sm font-bold text-slate-700">${b.title}</div>
                            <div class="text-[11px] text-slate-400 font-bold uppercase tracking-tight mt-1">ผู้ยืม: ${b.borrower}</div>
                        </td>
                        <td class="px-6 py-6">
                            <div class="text-xs font-bold ${isOverdue ? 'text-rose-600' : 'text-orange-500'} flex items-center gap-2 whitespace-nowrap">
                                <i class="fa-solid fa-calendar-check"></i> กำหนดคืน: ${dueDate.toLocaleDateString('th-TH')}
                            </div>
                            <div class="text-[11px] text-slate-400 mt-1.5 font-medium whitespace-nowrap">เบอร์โทร: ${b.phone || '-'}</div>
                        </td>
                        <td class="px-6 py-6 text-right">
                            <button onclick="returnBook('${b.id}')" class="px-6 py-3 bg-emerald-500 text-white rounded-2xl text-xs font-black shadow-lg shadow-emerald-100 hover:bg-emerald-600 whitespace-nowrap">คืนหนังสือ</button>
                        </td>
                    </tr>`}).join('');
            } else if (currentTab === 'lost') {
                const lost = books.filter(b => b.status === 'lost');
                html += lost.map(b => `
                    <tr class="bg-rose-50/20 rounded-2xl">
                        <td class="px-6 py-6 font-mono text-xs text-slate-400">#${b.id}</td>
                        <td class="px-6 py-6 font-bold text-slate-700 text-sm">${b.title}</td>
                        <td class="px-6 py-6">${getStatusBadge(b)}</td>
                        <td class="px-6 py-6 text-right">
                             <button onclick="openModal('edit', '${b.id}')" class="px-4 py-2 border-2 border-rose-100 text-rose-500 rounded-xl text-xs font-bold hover:bg-rose-50 transition-all whitespace-nowrap">ปรับปรุงสถานะ</button>
                        </td>
                    </tr>`).join('');
            } else if (currentTab === 'history') {
                html += history.map(h => `
                    <tr class="bg-white italic rounded-xl">
                        <td class="px-6 py-6 text-xs text-slate-300 font-mono">${new Date(h.at?.seconds * 1000).toLocaleDateString('th-TH')}</td>
                        <td class="px-6 py-6 font-bold text-slate-500 text-sm">${h.bookTitle}</td>
                        <td class="px-6 py-6 text-xs text-slate-400">คืนโดย: <span class="font-bold">${h.user}</span></td>
                        <td class="px-6 py-6 text-right"><i class="fa-solid fa-circle-check text-emerald-400 text-lg"></i></td>
                    </tr>`).join('');
            }

            html += `</tbody></table>`;
            if (books.length === 0 && currentTab !== 'history') html = `<div class="py-24 text-center"><p class="text-sm text-slate-300 font-bold uppercase tracking-[0.2em]">ไม่พบข้อมูลในฐานข้อมูล</p></div>`;
            container.innerHTML = html;
        };

        function getStatusBadge(b) {
            const common = "status-badge px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider whitespace-nowrap";
            if(b.status === 'borrowed') return `<span class="bg-orange-50 text-orange-600 ${common}">ถูกยืม</span>`;
            if(b.status === 'lost') return `<span class="bg-rose-100 text-rose-600 ${common}">หาย</span>`;
            return `<span class="bg-emerald-50 text-emerald-600 ${common}">มีอยู่</span>`;
        }

        window.switchTab = (t) => {
            currentTab = t;
            ['all', 'borrows', 'lost', 'history'].forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                if (btn) btn.className = tab === t 
                    ? 'flex items-center gap-3 px-8 py-5 text-sm font-bold whitespace-nowrap tab-active transition-all'
                    : 'flex items-center gap-3 px-8 py-5 text-sm font-bold whitespace-nowrap text-slate-400 hover:text-indigo-600 transition-all';
            });
            renderData();
        };

        window.updateStats = () => {
            document.getElementById('stat-total').innerText = books.length;
            document.getElementById('stat-available').innerText = books.filter(b => b.status === 'available').length;
            document.getElementById('stat-borrowed').innerText = books.filter(b => b.status === 'borrowed').length;
            document.getElementById('stat-lost').innerText = books.filter(b => b.status === 'lost').length;
            
            const overdue = books.filter(b => {
                if(b.status !== 'borrowed' || !b.ts) return false;
                const d = new Date(b.ts.seconds * 1000);
                d.setDate(d.getDate() + 7);
                return new Date() > d;
            });
            document.getElementById('noti-dot').classList.toggle('hidden', overdue.length === 0);
            
            document.getElementById('noti-content').innerHTML = overdue.length ? overdue.map(b => `
                <div class="px-6 py-5 border-b border-slate-50 hover:bg-rose-50 transition-colors">
                    <p class="text-xs font-bold text-slate-800">${b.title}</p>
                    <p class="text-[10px] text-rose-500 font-bold uppercase mt-1">เกินกำหนด: ${b.borrower}</p>
                </div>`).join('') : '<div class="p-12 text-center text-xs text-slate-300 font-bold uppercase tracking-widest">ไม่มีรายการค้างส่ง</div>';
        };

        window.openModal = (mode, id = null) => {
            const overlay = document.getElementById('modal-overlay');
            const modeInput = document.getElementById('form-mode');
            const fId = document.getElementById('f-id');
            const fTitle = document.getElementById('f-title');
            const fStatus = document.getElementById('f-status');

            if(mode === 'add') {
                modeInput.value = 'add';
                fId.value = ''; fId.readOnly = false;
                fTitle.value = '';
                fStatus.value = 'available';
                document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-plus-circle text-indigo-500"></i> เพิ่มหนังสือใหม่';
            } else {
                const b = books.find(x => x.id === id);
                modeInput.value = 'edit';
                fId.value = b.id; fId.readOnly = true;
                fTitle.value = b.title;
                fStatus.value = b.status;
                document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-edit text-indigo-500"></i> แก้ไขข้อมูลหนังสือ';
            }
            overlay.classList.remove('hidden');
        };

        window.saveBook = async () => {
            const id = document.getElementById('f-id').value.trim();
            const title = document.getElementById('f-title').value.trim();
            const status = document.getElementById('f-status').value;
            if(!id || !title) return;

            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id), {
                title, status, updatedAt: serverTimestamp()
            }, { merge: true });
            closeModal();
            Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
        };

        window.deleteBook = async (id) => {
            const res = await Swal.fire({ 
                title: 'ยืนยันการลบ?',
                text: 'คุณไม่สามารถย้อนกลับรายการนี้ได้',
                icon: 'warning', 
                showCancelButton: true, 
                confirmButtonText: 'ลบข้อมูล', 
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#e11d48'
            });
            if(res.isConfirmed) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id));
        };

        window.borrowPrompt = (id) => {
            const b = books.find(x => x.id === id);
            document.getElementById('b-id').value = id;
            document.getElementById('b-book-title').innerText = b.title;
            
            const returnDate = new Date();
            returnDate.setDate(returnDate.getDate() + 7);
            document.getElementById('b-return-date').innerText = returnDate.toLocaleDateString('th-TH', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });

            document.getElementById('modal-borrow').classList.remove('hidden');
        };

        window.confirmBorrow = async () => {
            const id = document.getElementById('b-id').value;
            const user = document.getElementById('b-user').value.trim();
            const phone = document.getElementById('b-phone').value.trim();
            if(!user) {
                Swal.fire({ text: 'กรุณาระบุชื่อผู้ยืม', icon: 'error', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
                return;
            }

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id), {
                status: 'borrowed', borrower: user, phone, ts: serverTimestamp()
            });
            closeModal();
            Swal.fire({ 
                icon: 'success', 
                title: 'บันทึกการยืมสำเร็จ', 
                text: `กรุณาคืนหนังสือภายในวันที่ ${document.getElementById('b-return-date').innerText}`,
                confirmButtonText: 'ตกลง',
                confirmButtonColor: '#4f46e5'
            });
        };

        window.returnBook = async (id) => {
            const b = books.find(x => x.id === id);
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), {
                bookId: id, bookTitle: b.title, user: b.borrower, at: serverTimestamp()
            });
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id), {
                status: 'available', borrower: '', phone: '', ts: null
            });
            Swal.fire({ icon: 'success', title: 'คืนหนังสือเรียบร้อย', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
        };

        window.closeModal = () => {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.getElementById('modal-borrow').classList.add('hidden');
            document.getElementById('b-user').value = '';
            document.getElementById('b-phone').value = '';
        };

        window.toggleNoti = () => document.getElementById('noti-panel').classList.toggle('active');

    </script>
</body>
</html>

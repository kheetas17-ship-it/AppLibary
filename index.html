<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Hub - Modern Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background: #fcfdfe; color: #1e293b; }
        .tab-active { color: #4f46e5; border-bottom: 2px solid #4f46e5; background: #f5f3ff; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #f1f5f9; }
        .noti-dropdown { display: none; position: absolute; right: 0; top: 60px; width: 320px; z-index: 50; }
        .noti-dropdown.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header & Brand -->
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                    <i class="fa-solid fa-book-open"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold tracking-tight">LibraryHub</h1>
                    <p class="text-[10px] text-slate-400 font-medium uppercase tracking-tighter">Minimal System</p>
                </div>
            </div>
            
            <div class="relative">
                <button onclick="toggleNoti()" class="relative p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                    <i class="fa-solid fa-bell text-lg"></i>
                    <span id="noti-dot" class="hidden absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-white"></span>
                </button>
                <div id="noti-panel" class="noti-dropdown bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden">
                    <div class="px-4 py-3 bg-slate-50 border-b border-slate-100 text-[10px] font-bold uppercase text-slate-400">แจ้งเตือนหนังสือค้างส่ง</div>
                    <div id="noti-content" class="max-h-60 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400"><i class="fa-solid fa-database"></i></div>
                <div><p class="text-[10px] font-bold text-slate-400 uppercase">ทั้งหมด</p><h2 id="stat-total" class="text-xl font-bold">0</h2></div>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-emerald-50 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500"><i class="fa-solid fa-check"></i></div>
                <div><p class="text-[10px] font-bold text-emerald-500 uppercase">มีอยู่</p><h2 id="stat-available" class="text-xl font-bold text-emerald-600">0</h2></div>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-orange-50 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-500"><i class="fa-solid fa-clock"></i></div>
                <div><p class="text-[10px] font-bold text-orange-500 uppercase">ถูกยืม</p><h2 id="stat-borrowed" class="text-xl font-bold text-orange-600">0</h2></div>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-rose-50 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 bg-rose-50 rounded-2xl flex items-center justify-center text-rose-500"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <div><p class="text-[10px] font-bold text-rose-500 uppercase">หาย</p><h2 id="stat-lost" class="text-xl font-bold text-rose-600">0</h2></div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden">
            <!-- Navigation with Icons -->
            <div class="flex overflow-x-auto border-b border-slate-50 scrollbar-hide">
                <button onclick="switchTab('all')" id="tab-all" class="flex items-center gap-2 px-6 py-4 text-xs font-bold whitespace-nowrap tab-active transition-all">
                    <i class="fa-solid fa-layer-group"></i> หนังสือทั้งหมด
                </button>
                <button onclick="switchTab('borrows')" id="tab-borrows" class="flex items-center gap-2 px-6 py-4 text-xs font-bold whitespace-nowrap text-slate-400 hover:text-indigo-600 transition-all">
                    <i class="fa-solid fa-arrow-right-arrow-left"></i> รายการยืมคืน
                </button>
                <button onclick="switchTab('lost')" id="tab-lost" class="flex items-center gap-2 px-6 py-4 text-xs font-bold whitespace-nowrap text-slate-400 hover:text-indigo-600 transition-all">
                    <i class="fa-solid fa-circle-exclamation"></i> แจ้งหาย/ชำรุด
                </button>
                <button onclick="switchTab('history')" id="tab-history" class="flex items-center gap-2 px-6 py-4 text-xs font-bold whitespace-nowrap text-slate-400 hover:text-indigo-600 transition-all">
                    <i class="fa-solid fa-clock-rotate-left"></i> ประวัติการคืน
                </button>
            </div>

            <!-- Toolbar -->
            <div class="p-6 flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50/30">
                <div class="relative w-full md:max-w-xs">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                    <input type="text" id="searchInput" oninput="renderData()" placeholder="ค้นหาชื่อหนังสือ หรือ ID..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-100 outline-none">
                </div>
                <button onclick="openModal('add')" class="w-full md:w-auto bg-indigo-600 text-white px-6 py-3 rounded-xl text-xs font-bold shadow-md shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all">
                    <i class="fa-solid fa-plus mr-2"></i>เพิ่มหนังสือ
                </button>
            </div>

            <!-- Content Area -->
            <div class="p-2 md:p-4 min-h-[400px]">
                <div id="view-container" class="overflow-x-auto">
                    <!-- Table injects here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Unified Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <h3 id="modal-title" class="text-lg font-bold mb-6 text-slate-800 flex items-center gap-2">
                <i class="fa-solid fa-pen-nib text-indigo-500"></i> บันทึกข้อมูล
            </h3>
            <div class="space-y-4">
                <input type="hidden" id="form-mode">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">รหัสหนังสือ</label>
                    <input type="text" id="f-id" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-sm font-mono focus:bg-white outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">ชื่อหนังสือ</label>
                    <input type="text" id="f-title" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-sm focus:bg-white outline-none">
                </div>
                <div id="f-status-group">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">สถานะ</label>
                    <select id="f-status" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none cursor-pointer">
                        <option value="available">มีอยู่</option>
                        <option value="borrowed">ถูกยืม</option>
                        <option value="lost">หาย</option>
                    </select>
                </div>
                <div class="flex gap-2 mt-8">
                    <button onclick="closeModal()" class="flex-1 py-3 text-slate-400 font-bold text-xs">ยกเลิก</button>
                    <button onclick="saveBook()" class="flex-[2] py-3 bg-indigo-600 text-white rounded-xl font-bold text-xs shadow-lg shadow-indigo-100">ยืนยันบันทึก</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Borrow Modal -->
    <div id="modal-borrow" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fa-solid fa-handshake"></i>
                </div>
                <h3 class="font-bold text-slate-800">ทำรายการยืม</h3>
                <p id="b-book-title" class="text-[10px] text-slate-400 font-bold uppercase mt-1"></p>
            </div>
            <input type="hidden" id="b-id">
            <div class="space-y-4">
                <input type="text" id="b-user" placeholder="ชื่อ-นามสกุล ผู้ยืม" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none">
                <input type="tel" id="b-phone" placeholder="เบอร์โทรศัพท์" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none">
                <button onclick="confirmBorrow()" class="w-full py-4 bg-orange-500 text-white rounded-xl font-bold text-xs shadow-lg shadow-orange-100 hover:bg-orange-600">บันทึกการยืม</button>
                <button onclick="closeModal()" class="w-full text-[10px] text-slate-300 font-bold uppercase py-2">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, addDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse('{"apiKey":"AIzaSyDnawFy5prH0bPLNbJGH4uCB9Qnu2olNbo","authDomain":"museumapp-c49a8.firebaseapp.com","projectId":"museumapp-c49a8","storageBucket":"museumapp-c49a8.firebasestorage.app","messagingSenderId":"246960041791","appId":"1:246960041791:web:78911e60ff746a97ab6d8a"}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lib-v3-final';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let books = [];
        let history = [];
        let currentTab = 'all';

        signInAnonymously(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'books'), (snap) => {
                    books = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderData();
                    updateStats();
                });

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'history'), (snap) => {
                    history = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.at?.seconds || 0) - (a.at?.seconds || 0));
                    if(currentTab === 'history') renderData();
                });
            }
        });

        window.renderData = () => {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('view-container');
            
            let html = `<table class="w-full text-left border-separate border-spacing-y-1">
                <thead><tr class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                    <th class="px-4 py-2">ID</th>
                    <th class="px-4 py-2">รายการ</th>
                    <th class="px-4 py-2">สถานะ</th>
                    <th class="px-4 py-2 text-right">ดำเนินการ</th>
                </tr></thead><tbody class="divide-y divide-slate-50">`;

            if (currentTab === 'all') {
                const filtered = books.filter(b => b.title?.toLowerCase().includes(search) || b.id.toLowerCase().includes(search));
                html += filtered.map(b => `
                    <tr class="bg-white hover:bg-slate-50 transition-colors">
                        <td class="px-4 py-4 font-mono text-[10px] text-slate-400">#${b.id}</td>
                        <td class="px-4 py-4 font-bold text-slate-700 text-xs">${b.title}</td>
                        <td class="px-4 py-4">${getStatusBadge(b)}</td>
                        <td class="px-4 py-4 text-right flex justify-end gap-1">
                            ${b.status === 'available' ? `<button onclick="borrowPrompt('${b.id}')" class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-[10px] font-bold">ยืม</button>` : ''}
                            <button onclick="openModal('edit', '${b.id}')" class="p-2 text-slate-300 hover:text-indigo-500"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteBook('${b.id}')" class="p-2 text-slate-300 hover:text-rose-500"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>`).join('');
            } else if (currentTab === 'borrows') {
                const borrowed = books.filter(b => b.status === 'borrowed');
                html += borrowed.map(b => `
                    <tr class="bg-white">
                        <td class="px-4 py-4 font-mono text-[10px] text-slate-400">#${b.id}</td>
                        <td class="px-4 py-4">
                            <div class="text-xs font-bold text-slate-700">${b.title}</div>
                            <div class="text-[9px] text-slate-400 uppercase tracking-tighter">ผู้ยืม: ${b.borrower}</div>
                        </td>
                        <td class="px-4 py-4">
                            <div class="text-[10px] font-bold text-orange-500"><i class="fa-solid fa-calendar mr-1"></i> ยืมเมื่อ: ${new Date(b.ts?.seconds * 1000).toLocaleDateString()}</div>
                            <div class="text-[9px] text-slate-400 mt-1">โทร: ${b.phone || '-'}</div>
                        </td>
                        <td class="px-4 py-4 text-right">
                            <button onclick="returnBook('${b.id}')" class="px-4 py-2 bg-emerald-500 text-white rounded-xl text-[10px] font-bold shadow-sm">คืนหนังสือ</button>
                        </td>
                    </tr>`).join('');
            } else if (currentTab === 'lost') {
                const lost = books.filter(b => b.status === 'lost');
                html += lost.map(b => `
                    <tr class="bg-rose-50/20">
                        <td class="px-4 py-4 font-mono text-[10px] text-slate-400">#${b.id}</td>
                        <td class="px-4 py-4 font-bold text-slate-700 text-xs">${b.title}</td>
                        <td class="px-4 py-4"><span class="bg-rose-100 text-rose-600 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tight">หาย</span></td>
                        <td class="px-4 py-4 text-right">
                             <button onclick="openModal('edit', '${b.id}')" class="px-3 py-1 border border-rose-200 text-rose-500 rounded-lg text-[10px] font-bold">ปรับสถานะ</button>
                        </td>
                    </tr>`).join('');
            } else if (currentTab === 'history') {
                html += history.map(h => `
                    <tr class="bg-white italic">
                        <td class="px-4 py-4 text-[9px] text-slate-300 font-mono">${new Date(h.at?.seconds * 1000).toLocaleDateString()}</td>
                        <td class="px-4 py-4 font-bold text-slate-600 text-xs">${h.bookTitle}</td>
                        <td class="px-4 py-4 text-[10px] text-slate-400">คืนโดย: ${h.user}</td>
                        <td class="px-4 py-4 text-right"><i class="fa-solid fa-circle-check text-emerald-300"></i></td>
                    </tr>`).join('');
            }

            html += `</tbody></table>`;
            if (books.length === 0 && currentTab !== 'history') html = `<div class="py-20 text-center"><p class="text-xs text-slate-300 font-bold uppercase">ไม่พบข้อมูลหนังสือ</p></div>`;
            container.innerHTML = html;
        };

        function getStatusBadge(b) {
            if(b.status === 'borrowed') return `<span class="bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tight">ถูกยืม</span>`;
            if(b.status === 'lost') return `<span class="bg-rose-100 text-rose-600 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tight">หาย</span>`;
            return `<span class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tight">มีอยู่</span>`;
        }

        window.switchTab = (t) => {
            currentTab = t;
            ['all', 'borrows', 'lost', 'history'].forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                btn.className = tab === t 
                    ? 'flex items-center gap-2 px-6 py-4 text-xs font-bold whitespace-nowrap tab-active transition-all'
                    : 'flex items-center gap-2 px-6 py-4 text-xs font-bold whitespace-nowrap text-slate-400 hover:text-indigo-600 transition-all';
            });
            renderData();
        };

        window.updateStats = () => {
            document.getElementById('stat-total').innerText = books.length;
            document.getElementById('stat-available').innerText = books.filter(b => b.status === 'available').length;
            document.getElementById('stat-borrowed').innerText = books.filter(b => b.status === 'borrowed').length;
            document.getElementById('stat-lost').innerText = books.filter(b => b.status === 'lost').length;
            
            const overdue = books.filter(b => {
                if(b.status !== 'borrowed' || !b.ts) return false;
                const d = new Date(b.ts.seconds * 1000);
                d.setDate(d.getDate() + 7);
                return new Date() > d;
            });
            document.getElementById('noti-dot').classList.toggle('hidden', overdue.length === 0);
            
            document.getElementById('noti-content').innerHTML = overdue.length ? overdue.map(b => `
                <div class="p-4 border-b border-slate-50 hover:bg-rose-50 transition-colors">
                    <p class="text-[10px] font-bold text-slate-800">${b.title}</p>
                    <p class="text-[8px] text-rose-500 font-bold uppercase mt-0.5">เกินกำหนดส่ง: ${b.borrower}</p>
                </div>`).join('') : '<div class="p-8 text-center text-[10px] text-slate-300 font-bold uppercase">ไม่มีรายการค้างส่ง</div>';
        };

        window.openModal = (mode, id = null) => {
            const overlay = document.getElementById('modal-overlay');
            const modeInput = document.getElementById('form-mode');
            const fId = document.getElementById('f-id');
            const fTitle = document.getElementById('f-title');
            const fStatus = document.getElementById('f-status');

            if(mode === 'add') {
                modeInput.value = 'add';
                fId.value = ''; fId.readOnly = false;
                fTitle.value = '';
                fStatus.value = 'available';
                document.getElementById('modal-title').innerText = 'เพิ่มหนังสือใหม่';
            } else {
                const b = books.find(x => x.id === id);
                modeInput.value = 'edit';
                fId.value = b.id; fId.readOnly = true;
                fTitle.value = b.title;
                fStatus.value = b.status;
                document.getElementById('modal-title').innerText = 'แก้ไขข้อมูล';
            }
            overlay.classList.remove('hidden');
        };

        window.saveBook = async () => {
            const id = document.getElementById('f-id').value.trim();
            const title = document.getElementById('f-title').value.trim();
            const status = document.getElementById('f-status').value;
            if(!id || !title) return;

            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id), {
                title, status, updatedAt: serverTimestamp()
            }, { merge: true });
            closeModal();
            Swal.fire({ icon: 'success', text: 'บันทึกสำเร็จ', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
        };

        window.deleteBook = async (id) => {
            const res = await Swal.fire({ text: 'ยืนยันการลบหนังสือเล่มนี้?', icon: 'warning', showCancelButton: true, confirmButtonText: 'ลบ', cancelButtonText: 'ยกเลิก' });
            if(res.isConfirmed) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id));
        };

        window.borrowPrompt = (id) => {
            const b = books.find(x => x.id === id);
            document.getElementById('b-id').value = id;
            document.getElementById('b-book-title').innerText = b.title;
            document.getElementById('modal-borrow').classList.remove('hidden');
        };

        window.confirmBorrow = async () => {
            const id = document.getElementById('b-id').value;
            const user = document.getElementById('b-user').value.trim();
            const phone = document.getElementById('b-phone').value.trim();
            if(!user) return;

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id), {
                status: 'borrowed', borrower: user, phone, ts: serverTimestamp()
            });
            closeModal();
            Swal.fire({ icon: 'success', text: 'ยืมหนังสือสำเร็จ', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
        };

        window.returnBook = async (id) => {
            const b = books.find(x => x.id === id);
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), {
                bookId: id, bookTitle: b.title, user: b.borrower, at: serverTimestamp()
            });
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id), {
                status: 'available', borrower: '', phone: '', ts: null
            });
            Swal.fire({ icon: 'success', text: 'คืนหนังสือเรียบร้อย', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
        };

        window.closeModal = () => {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.getElementById('modal-borrow').classList.add('hidden');
        };

        window.toggleNoti = () => document.getElementById('noti-panel').classList.toggle('active');

    </script>
</body>
</html>

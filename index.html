<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Manager - Safe Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 700; }
        .noti-dropdown { display: none; position: absolute; right: 0; top: 70px; width: 340px; background: white; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; z-index: 100; }
        .noti-dropdown.active { display: block; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- Loading State -->
    <div id="loading-screen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-[9999]">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-slate-500 animate-pulse">กำลังโหลดข้อมูลเดิมของคุณ...</p>
    </div>

    <div id="app-ui" class="hidden min-h-screen">
        <!-- Header -->
        <nav class="bg-white border-b border-slate-200 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-lg text-white">
                        <i class="fa-solid fa-book-bookmark"></i>
                    </div>
                    <h1 class="font-bold text-slate-900">ระบบจัดการห้องสมุด</h1>
                </div>
                
                <div class="relative">
                    <button onclick="document.getElementById('noti-box').classList.toggle('active')" class="relative p-2 text-slate-400 hover:bg-slate-50 rounded-full">
                        <i class="fa-solid fa-bell text-xl"></i>
                        <span id="noti-badge" class="hidden absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                    <div id="noti-box" class="noti-dropdown overflow-hidden">
                        <div class="p-4 bg-slate-50 border-b border-slate-100 font-bold text-xs uppercase tracking-wider text-slate-500">รายการค้างส่ง</div>
                        <div id="noti-list" class="max-h-64 overflow-y-auto"></div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 py-8">
            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">ทั้งหมด</p>
                    <p id="stat-total" class="text-2xl font-black">0</p>
                </div>
                <div class="bg-white p-5 rounded-2xl border-l-4 border-emerald-500 shadow-sm">
                    <p class="text-[10px] font-bold text-emerald-500 uppercase mb-1">ว่าง</p>
                    <p id="stat-available" class="text-2xl font-black text-emerald-600">0</p>
                </div>
                <div class="bg-white p-5 rounded-2xl border-l-4 border-orange-500 shadow-sm">
                    <p class="text-[10px] font-bold text-orange-500 uppercase mb-1">ถูกยืม</p>
                    <p id="stat-borrowed" class="text-2xl font-black text-orange-600">0</p>
                </div>
                <div class="bg-white p-5 rounded-2xl border-l-4 border-rose-500 shadow-sm">
                    <p class="text-[10px] font-bold text-rose-500 uppercase mb-1">แจ้งหาย</p>
                    <p id="stat-lost" class="text-2xl font-black text-rose-600">0</p>
                </div>
            </div>

            <!-- Content Card -->
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="flex border-b border-slate-100 bg-slate-50/50">
                    <button onclick="switchTab('inventory')" id="btn-inventory" class="px-6 py-4 text-sm tab-active">คลังหนังสือ</button>
                    <button onclick="switchTab('borrows')" id="btn-borrows" class="px-6 py-4 text-sm text-slate-500">ยืม-คืน</button>
                    <button onclick="switchTab('history')" id="btn-history" class="px-6 py-4 text-sm text-slate-500">ประวัติ</button>
                </div>

                <!-- Search & Add -->
                <div class="p-6 border-b border-slate-50 flex flex-col md:flex-row gap-4">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-search absolute left-4 top-3.5 text-slate-300"></i>
                        <input type="text" id="search" oninput="renderAll()" placeholder="ค้นหาชื่อหรือรหัสหนังสือ..." class="w-full pl-11 pr-4 py-3 bg-slate-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <button onclick="openBookModal()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl text-sm font-bold hover:bg-indigo-700 transition-all">
                        <i class="fa-solid fa-plus mr-2"></i>เพิ่มหนังสือใหม่
                    </button>
                </div>

                <!-- Tables -->
                <div id="view-inventory" class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase font-bold tracking-widest">
                            <tr>
                                <th class="px-6 py-4">ID</th>
                                <th class="px-6 py-4">ชื่อหนังสือ</th>
                                <th class="px-6 py-4">สถานะ</th>
                                <th class="px-6 py-4 text-right">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="table-inventory" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>

                <div id="view-borrows" class="hidden overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase font-bold tracking-widest">
                            <tr>
                                <th class="px-6 py-4">หนังสือ</th>
                                <th class="px-6 py-4">ผู้ยืม</th>
                                <th class="px-6 py-4">กำหนดคืน</th>
                                <th class="px-6 py-4 text-right">ดำเนินการ</th>
                            </tr>
                        </thead>
                        <tbody id="table-borrows" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>

                <div id="view-history" class="hidden overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase font-bold tracking-widest">
                            <tr>
                                <th class="px-6 py-4">วัน-เวลา</th>
                                <th class="px-6 py-4">รายการ</th>
                                <th class="px-6 py-4">ผู้เกี่ยวข้อง</th>
                                <th class="px-6 py-4 text-right">ผลลัพธ์</th>
                            </tr>
                        </thead>
                        <tbody id="table-history" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals (เหมือนเดิมแต่ปรับปรุงความปลอดภัยข้อมูล) -->
    <div id="modal-book" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-xl">
            <h3 id="modal-title" class="text-lg font-bold mb-6">บันทึกข้อมูล</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">รหัสหนังสือ (ID)</label>
                    <input type="text" id="m-id" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">ชื่อหนังสือ</label>
                    <input type="text" id="m-title" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
                <div id="status-container">
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">สถานะ</label>
                    <select id="m-status" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                        <option value="available">พร้อมยืม</option>
                        <option value="lost">แจ้งหนังสือหาย</option>
                    </select>
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="closeModals()" class="flex-1 py-3 text-slate-400 font-bold">ยกเลิก</button>
                    <button onclick="saveBook()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">บันทึกข้อมูล</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-borrow" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-8 shadow-xl">
            <h3 class="text-lg font-bold mb-2">ทำรายการยืม</h3>
            <p id="borrow-book-name" class="text-xs text-indigo-600 font-bold mb-6 italic"></p>
            <input type="hidden" id="b-id">
            <div class="space-y-4">
                <input type="text" id="b-name" placeholder="ชื่อผู้ยืม" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm">
                <input type="tel" id="b-phone" placeholder="เบอร์โทรติดต่อ" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm">
                <button onclick="confirmBorrow()" class="w-full py-4 bg-orange-500 text-white rounded-xl font-bold shadow-lg shadow-orange-100">ยืนยันการยืม</button>
                <button onclick="closeModals()" class="w-full py-2 text-slate-400 text-xs">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, addDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIG คงเดิมเพื่อรักษาข้อมูล
        const firebaseConfig = JSON.parse('{"apiKey":"AIzaSyDnawFy5prH0bPLNbJGH4uCB9Qnu2olNbo","authDomain":"museumapp-c49a8.firebaseapp.com","projectId":"museumapp-c49a8","storageBucket":"museumapp-c49a8.firebasestorage.app","messagingSenderId":"246960041791","appId":"1:246960041791:web:78911e60ff746a97ab6d8a"}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lib-master-v2';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let books = [];
        let history = [];

        // Auth
        const init = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        init();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('app-ui').classList.remove('hidden');
                startSync();
            }
        });

        function startSync() {
            // ดึงข้อมูลหนังสือ (ตัวแปรสำคัญ ข้อมูลเก่าอยู่ที่นี่)
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'books'), (snap) => {
                books = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderAll();
            });

            // ดึงประวัติ
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'history'), (snap) => {
                history = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.at?.seconds || 0) - (a.at?.seconds || 0));
                renderHistory();
            });
        }

        window.renderAll = () => {
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = books.filter(b => b.title?.toLowerCase().includes(search) || b.id.toLowerCase().includes(search));
            
            // Inventory
            document.getElementById('table-inventory').innerHTML = filtered.map(b => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 font-mono text-[10px] text-slate-400">${b.id}</td>
                    <td class="px-6 py-4 font-bold text-slate-700">${b.title}</td>
                    <td class="px-6 py-4">${getStatusBadge(b)}</td>
                    <td class="px-6 py-4 text-right flex justify-end gap-2">
                        ${b.status === 'available' ? `<button onclick="openBorrowModal('${b.id}')" class="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg text-xs font-bold">ยืม</button>` : ''}
                        ${b.status === 'borrowed' ? `<button onclick="returnBook('${b.id}')" class="text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg text-xs font-bold">รับคืน</button>` : ''}
                        <button onclick="openBookModal('${b.id}')" class="text-slate-300 hover:text-blue-500 px-2"><i class="fa-solid fa-edit"></i></button>
                        <button onclick="deleteBook('${b.id}')" class="text-slate-300 hover:text-red-500 px-2"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');

            // Borrows
            const borrowed = books.filter(b => b.status === 'borrowed');
            document.getElementById('table-borrows').innerHTML = borrowed.map(b => {
                const dueDate = new Date(b.ts?.seconds * 1000);
                dueDate.setDate(dueDate.getDate() + 7);
                const isOver = new Date() > dueDate;
                return `
                <tr class="${isOver ? 'bg-red-50' : ''}">
                    <td class="px-6 py-4 font-bold">${b.title}</td>
                    <td class="px-6 py-4 text-xs">${b.borrower}<br><span class="text-[10px] text-slate-400">${b.phone || '-'}</span></td>
                    <td class="px-6 py-4 text-[11px] font-bold ${isOver ? 'text-red-600' : 'text-slate-400'}">${dueDate.toLocaleDateString('th-TH')}</td>
                    <td class="px-6 py-4 text-right"><button onclick="returnBook('${b.id}')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold">คืนหนังสือ</button></td>
                </tr>`;
            }).join('');

            // Stats
            document.getElementById('stat-total').innerText = books.length;
            document.getElementById('stat-available').innerText = books.filter(b => b.status === 'available').length;
            document.getElementById('stat-borrowed').innerText = books.filter(b => b.status === 'borrowed').length;
            document.getElementById('stat-lost').innerText = books.filter(b => b.status === 'lost').length;

            updateNotifications();
        }

        function getStatusBadge(b) {
            if (b.status === 'borrowed') return `<span class="bg-orange-100 text-orange-600 px-2 py-1 rounded text-[9px] font-black uppercase">ยืมโดย ${b.borrower}</span>`;
            if (b.status === 'lost') return `<span class="bg-rose-100 text-rose-600 px-2 py-1 rounded text-[9px] font-black uppercase">หาย</span>`;
            return `<span class="bg-emerald-100 text-emerald-600 px-2 py-1 rounded text-[9px] font-black uppercase">ว่าง</span>`;
        }

        window.renderHistory = () => {
            document.getElementById('table-history').innerHTML = history.map(h => `
                <tr class="text-[11px]">
                    <td class="px-6 py-4 text-slate-400">${h.at ? new Date(h.at.seconds * 1000).toLocaleString('th-TH') : '-'}</td>
                    <td class="px-6 py-4 font-bold">${h.bookTitle}</td>
                    <td class="px-6 py-4 text-indigo-600 font-bold">${h.user}</td>
                    <td class="px-6 py-4 text-right"><span class="text-emerald-500 font-bold uppercase">คืนแล้ว</span></td>
                </tr>`).join('');
        }

        function updateNotifications() {
            const overdue = books.filter(b => {
                if(b.status !== 'borrowed' || !b.ts) return false;
                const d = new Date(b.ts.seconds * 1000);
                d.setDate(d.getDate() + 7);
                return new Date() > d;
            });
            const badge = document.getElementById('noti-badge');
            const list = document.getElementById('noti-list');
            
            if(overdue.length > 0) {
                badge.classList.remove('hidden');
                list.innerHTML = overdue.map(b => `<div class="p-4 border-b border-slate-50 text-xs font-bold text-red-600">${b.title} (ค้างส่ง)</div>`).join('');
            } else {
                badge.classList.add('hidden');
                list.innerHTML = `<div class="p-8 text-center text-[10px] text-slate-300 italic">ไม่มีรายการค้างส่ง</div>`;
            }
        }

        // DB Actions
        window.saveBook = async () => {
            const id = document.getElementById('m-id').value.trim();
            const title = document.getElementById('m-title').value.trim();
            const status = document.getElementById('m-status').value;
            if(!id || !title) return;

            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'books', id);
            // ใช้ merge: true เพื่อไม่ให้ข้อมูลอื่นที่ไม่ได้ระบุหายไป
            await setDoc(ref, { title, status, updatedAt: serverTimestamp() }, { merge: true });
            closeModals();
            Swal.fire({ icon: 'success', title: 'สำเร็จ', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
        }

        window.deleteBook = async (id) => {
            const res = await Swal.fire({ title: 'ลบข้อมูล?', icon: 'warning', showCancelButton: true });
            if(res.isConfirmed) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id));
        }

        window.openBorrowModal = (id) => {
            const b = books.find(x => x.id === id);
            document.getElementById('b-id').value = id;
            document.getElementById('borrow-book-name').innerText = b.title;
            document.getElementById('modal-borrow').classList.remove('hidden');
        }

        window.confirmBorrow = async () => {
            const id = document.getElementById('b-id').value;
            const name = document.getElementById('b-name').value.trim();
            const phone = document.getElementById('b-phone').value.trim();
            if(!name) return;

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id), {
                status: 'borrowed', borrower: name, phone, ts: serverTimestamp()
            });
            closeModals();
        }

        window.returnBook = async (id) => {
            const b = books.find(x => x.id === id);
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), {
                bookId: id, bookTitle: b.title, user: b.borrower, at: serverTimestamp()
            });
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id), {
                status: 'available', borrower: '', phone: '', ts: null
            });
        }

        window.openBookModal = (id = null) => {
            const b = id ? books.find(x => x.id === id) : { id: '', title: '', status: 'available' };
            document.getElementById('m-id').value = b.id;
            document.getElementById('m-id').readOnly = !!id;
            document.getElementById('m-title').value = b.title;
            document.getElementById('m-status').value = b.status;
            document.getElementById('modal-title').innerText = id ? "แก้ไขหนังสือ" : "เพิ่มหนังสือ";
            document.getElementById('modal-book').classList.remove('hidden');
        }

        window.closeModals = () => {
            document.getElementById('modal-book').classList.add('hidden');
            document.getElementById('modal-borrow').classList.add('hidden');
        }

        window.switchTab = (t) => {
            ['inventory', 'borrows', 'history'].forEach(v => {
                document.getElementById(`view-${v}`).classList.toggle('hidden', v !== t);
                document.getElementById(`btn-${v}`).className = v === t ? 'px-6 py-4 text-sm tab-active' : 'px-6 py-4 text-sm text-slate-500';
            });
        }
    </script>
</body>
</html>

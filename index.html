<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบห้องสมุดอัจฉริยะ - museumapp-c49a8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1; font-weight: 600; }
        .overdue-row { background-color: #fff1f2 !important; border-left: 4px solid #e11d48 !important; }
        .loading-overlay { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .alert-pulse { animation: pulse-red 2s infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800">

    <div id="loading" class="loading-overlay">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
            <p class="text-slate-500">กำลังเชื่อมต่อฐานข้อมูลเดิมของคุณ...</p>
        </div>
    </div>

    <div id="app-content" class="hidden min-h-screen">
        <nav class="bg-slate-900 text-white shadow-xl sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-book-bookmark text-indigo-400 text-2xl"></i>
                    <span class="text-lg font-bold">Library Management</span>
                </div>
                <div class="text-xs text-slate-400">Database: museumapp-c49a8</div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 py-8">
            <!-- Stats Summary -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                    <p class="text-slate-400 text-[10px] uppercase font-bold">หนังสือทั้งหมด</p>
                    <h3 class="text-2xl font-black mt-1" id="stat-total">0</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 border-l-4 border-emerald-500">
                    <p class="text-emerald-500 text-[10px] uppercase font-bold">ว่างพร้อมยืม</p>
                    <h3 class="text-2xl font-black mt-1" id="stat-available">0</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 border-l-4 border-orange-500">
                    <p class="text-orange-500 text-[10px] uppercase font-bold">กำลังถูกยืม</p>
                    <h3 class="text-2xl font-black mt-1" id="stat-borrowed">0</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 border-l-4 border-red-500">
                    <p class="text-red-500 text-[10px] uppercase font-bold">ยืมเกิน 7 วัน</p>
                    <h3 class="text-2xl font-black mt-1 text-red-600" id="stat-overdue">0</h3>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="flex border-b border-slate-100 bg-slate-50/50 overflow-x-auto no-scrollbar">
                    <button onclick="switchTab('inventory')" id="tab-inventory" class="px-6 py-4 text-sm tab-active">
                        <i class="fa-solid fa-list mr-2"></i>คลังหนังสือ
                    </button>
                    <button onclick="switchTab('borrows')" id="tab-borrows" class="px-6 py-4 text-sm text-slate-500">
                        <i class="fa-solid fa-clock-rotate-left mr-2"></i>สถานะการยืม & แจ้งเตือน
                    </button>
                </div>

                <!-- Tab: Inventory -->
                <div id="view-inventory">
                    <div class="p-4 flex flex-col sm:flex-row justify-between gap-4 border-b border-slate-50">
                        <div class="relative flex-1">
                            <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-300"></i>
                            <input type="text" id="searchInput" oninput="renderInventory()" placeholder="ค้นหาด้วย ID หรือ ชื่อหนังสือ..." class="w-full pl-10 pr-4 py-2 bg-slate-100 border-none rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <button onclick="openBookModal()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg hover:bg-indigo-700 transition-all">
                            <i class="fa-solid fa-plus mr-2"></i>เพิ่มหนังสือใหม่
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase">
                                <tr>
                                    <th class="px-6 py-4">รหัส / สี</th>
                                    <th class="px-6 py-4">ข้อมูลหนังสือ</th>
                                    <th class="px-6 py-4">สถานะ</th>
                                    <th class="px-6 py-4 text-right">การจัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryTable" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Tab: Active Borrows -->
                <div id="view-borrows" class="hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase">
                                <tr>
                                    <th class="px-6 py-4">หนังสือ</th>
                                    <th class="px-6 py-4">ผู้ยืม</th>
                                    <th class="px-6 py-4">วันที่ยืม</th>
                                    <th class="px-6 py-4">สถานะคืน</th>
                                    <th class="px-6 py-4 text-right">ดำเนินการ</th>
                                </tr>
                            </thead>
                            <tbody id="borrowTable" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal: Add/Edit Book -->
    <div id="bookModal" class="fixed inset-0 bg-slate-900/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl border-t-8 border-indigo-600">
            <h3 id="modalTitle" class="text-xl font-bold mb-6 text-slate-800">ข้อมูลหนังสือ</h3>
            <div class="space-y-4">
                <input type="hidden" id="editId">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">รหัสหนังสือ (ID)</label>
                    <input type="text" id="m_id" class="w-full px-4 py-2 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="เช่น B001">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">ชื่อหนังสือ</label>
                    <input type="text" id="m_title" class="w-full px-4 py-2 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="ระบุชื่อหนังสือ">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">สีประจำหมวดหมู่</label>
                    <div class="flex gap-4">
                        <label class="cursor-pointer"><input type="radio" name="m_color" value="blue" checked class="hidden peer"><div class="w-8 h-8 rounded-full bg-blue-500 ring-offset-2 peer-checked:ring-2 ring-blue-500"></div></label>
                        <label class="cursor-pointer"><input type="radio" name="m_color" value="red" class="hidden peer"><div class="w-8 h-8 rounded-full bg-red-500 ring-offset-2 peer-checked:ring-2 ring-red-500"></div></label>
                        <label class="cursor-pointer"><input type="radio" name="m_color" value="green" class="hidden peer"><div class="w-8 h-8 rounded-full bg-green-500 ring-offset-2 peer-checked:ring-2 ring-green-500"></div></label>
                        <label class="cursor-pointer"><input type="radio" name="m_color" value="yellow" class="hidden peer"><div class="w-8 h-8 rounded-full bg-yellow-400 ring-offset-2 peer-checked:ring-2 ring-yellow-400"></div></label>
                    </div>
                </div>
                <div class="flex gap-3 pt-6">
                    <button onclick="closeModal()" class="flex-1 py-2 text-slate-400 font-bold hover:bg-slate-50 rounded-lg">ยกเลิก</button>
                    <button onclick="saveBook()" class="flex-1 py-2 bg-indigo-600 text-white rounded-lg font-bold shadow-lg hover:bg-indigo-700 transition-all">บันทึกข้อมูล</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Borrowing -->
    <div id="borrowModal" class="fixed inset-0 bg-slate-900/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl border-t-8 border-orange-500">
            <h3 class="text-xl font-bold mb-1 text-orange-600">ลงทะเบียนยืมหนังสือ</h3>
            <p class="text-[10px] text-slate-400 mb-6 uppercase font-bold tracking-widest">กำหนดคืนภายใน 7 วัน</p>
            <input type="hidden" id="b_target_id">
            <div class="space-y-4">
                <input type="text" id="b_name" placeholder="ชื่อ-นามสกุล ผู้ยืม" class="w-full px-4 py-3 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none transition-all">
                <input type="tel" id="b_phone" placeholder="เบอร์โทรศัพท์" class="w-full px-4 py-3 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none transition-all">
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-2 text-slate-400 font-bold">ยกเลิก</button>
                    <button onclick="confirmBorrow()" class="flex-1 py-2 bg-orange-500 text-white rounded-lg font-bold shadow-lg hover:bg-orange-600">ยืนยันการยืม</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnawFy5prH0bPLNbJGH4uCB9Qnu2olNbo",
            authDomain: "museumapp-c49a8.firebaseapp.com",
            projectId: "museumapp-c49a8",
            storageBucket: "museumapp-c49a8.firebasestorage.app",
            messagingSenderId: "246960041791",
            appId: "1:246960041791:web:78911e60ff746a97ab6d8a"
        };

        // ใช้ appId เดิม: "museum-lib" ข้อมูลของคุณจะกลับมาแน่นอนครับ
        const appId = "museum-lib"; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let books = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                setupData();
            } else {
                signInAnonymously(auth);
            }
        });

        function setupData() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'books'), (snap) => {
                books = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderInventory();
                renderBorrows();
                updateStats();
            });
        }

        window.renderInventory = () => {
            const tbody = document.getElementById('inventoryTable');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = books.filter(b => b.title?.toLowerCase().includes(search) || b.id.toLowerCase().includes(search));

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-12 text-center text-slate-300 italic">ไม่พบข้อมูลหนังสือ</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(b => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 rounded-full bg-${b.color || 'blue'}-500"></div>
                            <span class="font-mono text-[11px] text-slate-400 font-bold">${b.id}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800">${b.title || 'ไม่มีชื่อหนังสือ'}</div>
                    </td>
                    <td class="px-6 py-4">
                        ${b.status === 'borrowed' 
                            ? `<span class="text-orange-600 bg-orange-50 px-3 py-1 rounded-full text-[10px] font-bold border border-orange-100">ถูกยืม: ${b.borrower}</span>`
                            : `<span class="text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full text-[10px] font-bold border border-emerald-100">ว่าง</span>`}
                    </td>
                    <td class="px-6 py-4 text-right flex justify-end gap-2">
                        ${b.status !== 'borrowed' 
                            ? `<button onclick="openBorrowModal('${b.id}')" class="text-indigo-600 font-bold px-4 py-1 bg-indigo-50 rounded-lg hover:bg-indigo-600 hover:text-white transition-all text-xs">ยืม</button>` 
                            : `<button onclick="returnBook('${b.id}')" class="text-emerald-600 font-bold px-4 py-1 bg-emerald-50 rounded-lg hover:bg-emerald-600 hover:text-white transition-all text-xs">คืน</button>`}
                        <button onclick="openBookModal('${b.id}')" class="w-8 h-8 text-slate-300 hover:text-blue-600 flex items-center justify-center transition-all"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="deleteBook('${b.id}')" class="w-8 h-8 text-slate-300 hover:text-red-500 flex items-center justify-center transition-all"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                </tr>
            `).join('');
        };

        window.renderBorrows = () => {
            const tbody = document.getElementById('borrowTable');
            const borrowed = books.filter(b => b.status === 'borrowed');
            const now = new Date();

            if (borrowed.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-12 text-center text-slate-300 italic">ไม่มีรายการค้างส่งคืน</td></tr>`;
                return;
            }

            tbody.innerHTML = borrowed.map(b => {
                const borrowTime = b.timestamp?.seconds ? new Date(b.timestamp.seconds * 1000) : new Date();
                const diffTime = now - borrowTime;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                const isOverdue = diffDays >= 7;

                return `
                <tr class="${isOverdue ? 'overdue-row' : ''} transition-all">
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800">${b.title}</div>
                        <div class="text-[10px] text-slate-400 font-mono">ID: ${b.id}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-slate-700 font-bold">${b.borrower}</div>
                        <div class="text-[10px] text-slate-400"><i class="fa-solid fa-phone mr-1"></i>${b.phone || '-'}</div>
                    </td>
                    <td class="px-6 py-4 text-xs text-slate-500">${b.date || '-'}</td>
                    <td class="px-6 py-4">
                        ${isOverdue 
                            ? `<div class="text-red-600 font-black text-[10px] alert-pulse flex items-center gap-1"><i class="fa-solid fa-warning"></i> เกิน 7 วัน! (${diffDays} วัน)</div>` 
                            : `<div class="text-emerald-600 font-bold text-[10px] flex items-center gap-1"><i class="fa-solid fa-circle-check"></i> ยังอยู่ในกำหนด (${diffDays} วัน)</div>`}
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="returnBook('${b.id}')" class="bg-white border-2 border-emerald-500 text-emerald-600 px-4 py-1 rounded-lg text-xs font-bold hover:bg-emerald-500 hover:text-white transition-all">รับคืน</button>
                    </td>
                </tr>
                `;
            }).join('');
        };

        window.updateStats = () => {
            const total = books.length;
            const borrowed = books.filter(b => b.status === 'borrowed').length;
            const available = total - borrowed;
            
            let overdue = 0;
            const now = new Date();
            books.forEach(b => {
                if(b.status === 'borrowed' && b.timestamp) {
                    const days = Math.floor((now - new Date(b.timestamp.seconds * 1000)) / (1000 * 60 * 60 * 24));
                    if(days >= 7) overdue++;
                }
            });

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-available').innerText = available;
            document.getElementById('stat-borrowed').innerText = borrowed;
            document.getElementById('stat-overdue').innerText = overdue;
        };

        // UI & Modal Actions
        window.openBookModal = (id = null) => {
            document.getElementById('editId').value = id || "";
            document.getElementById('m_id').disabled = !!id;
            if(id) {
                const b = books.find(x => x.id === id);
                document.getElementById('m_id').value = b.id;
                document.getElementById('m_title').value = b.title;
                document.querySelector(`input[name="m_color"][value="${b.color || 'blue'}"]`).checked = true;
                document.getElementById('modalTitle').innerText = "แก้ไขข้อมูลหนังสือ";
            } else {
                document.getElementById('m_id').value = "";
                document.getElementById('m_title').value = "";
                document.getElementById('modalTitle').innerText = "เพิ่มหนังสือใหม่";
                document.querySelector('input[name="m_color"][value="blue"]').checked = true;
            }
            document.getElementById('bookModal').classList.remove('hidden');
        };

        window.saveBook = async () => {
            const id = document.getElementById('m_id').value.trim();
            const title = document.getElementById('m_title').value.trim();
            const color = document.querySelector('input[name="m_color"]:checked').value;
            const editId = document.getElementById('editId').value;

            if(!id || !title) return Swal.fire("ข้อมูลไม่ครบ", "กรุณาระบุรหัสและชื่อหนังสือ", "warning");

            try {
                if(editId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id), { title, color });
                } else {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id), { 
                        title, color, status: 'available', createdAt: serverTimestamp() 
                    });
                }
                closeModal();
                Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', timer: 1000, showConfirmButton: false });
            } catch (err) {
                Swal.fire("Error", "ไม่สามารถเข้าถึงฐานข้อมูลได้", "error");
            }
        };

        window.openBorrowModal = (id) => {
            document.getElementById('b_target_id').value = id;
            document.getElementById('b_name').value = "";
            document.getElementById('b_phone').value = "";
            document.getElementById('borrowModal').classList.remove('hidden');
        };

        window.confirmBorrow = async () => {
            const id = document.getElementById('b_target_id').value;
            const name = document.getElementById('b_name').value.trim();
            const phone = document.getElementById('b_phone').value.trim();
            if(!name || !phone) return Swal.fire("ข้อมูลไม่ครบ", "กรุณาระบุชื่อผู้ยืมและเบอร์โทร", "warning");

            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id), {
                    status: 'borrowed', borrower: name, phone: phone, 
                    date: new Date().toLocaleDateString('th-TH'),
                    timestamp: serverTimestamp()
                });
                closeModal();
                Swal.fire({ icon: 'success', title: 'ยืมสำเร็จ', text: 'ระบบจะเริ่มนับเวลา 7 วันตั้งแต่ตอนนี้' });
            } catch (err) {
                Swal.fire("Error", "เกิดข้อผิดพลาดในการทำรายการ", "error");
            }
        };

        window.returnBook = async (id) => {
            const res = await Swal.fire({
                title: 'ยืนยันการรับคืน?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'ยืนยัน',
                cancelButtonText: 'ยกเลิก'
            });

            if(res.isConfirmed) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id), {
                    status: 'available', borrower: '', phone: '', date: '', timestamp: null
                });
                Swal.fire({ icon: 'success', title: 'รับคืนเรียบร้อย', timer: 1000, showConfirmButton: false });
            }
        };

        window.deleteBook = async (id) => {
            const res = await Swal.fire({ 
                title: 'ลบหนังสือเล่มนี้?', 
                text: "ข้อมูลหนังสือเล่มนี้จะหายไปจากระบบถาวร",
                icon: 'warning', 
                showCancelButton: true,
                confirmButtonColor: '#e11d48'
            });
            if(res.isConfirmed) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id));
        };

        window.closeModal = () => {
            document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden'));
        };

        window.switchTab = (target) => {
            document.getElementById('view-inventory').classList.toggle('hidden', target !== 'inventory');
            document.getElementById('view-borrows').classList.toggle('hidden', target !== 'borrows');
            document.getElementById('tab-inventory').className = target === 'inventory' ? 'px-6 py-4 text-sm tab-active' : 'px-6 py-4 text-sm text-slate-500';
            document.getElementById('tab-borrows').className = target === 'borrows' ? 'px-6 py-4 text-sm tab-active' : 'px-6 py-4 text-sm text-slate-500';
        };

    </script>
</body>
</html>
